# .github/workflows/pr-auto-merge-conditional.yml
name: Conditional Auto Merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-and-merge:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Check PR Eligibility
        id: eligibility
        run: |
          set -euo pipefail

          # Get PR data
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH_NAME=${{ github.event.pull_request.head.ref }}
          PR_AUTHOR=${{ github.event.pull_request.user.login }}
          REQUIRED_APPROVER=${{ vars.REQUIRED_APPROVER }}

          if [[ -z "$REQUIRED_APPROVER" ]]; then
            REQUIRED_APPROVER=${{ github.repository_owner }}
          fi

          echo "PR Branch: $BRANCH_NAME"
          echo "PR Author: $PR_AUTHOR"
          echo "Required approver: $REQUIRED_APPROVER"

          # Check 1: Valid branch name pattern
          # Allowed: feature/*, bugfix/*, fix/*, docs/*, chore/*, refactor/*
          if [[ $BRANCH_NAME =~ ^(feature|bugfix|fix|docs|chore|refactor)/.*$ ]]; then
            echo "✓ Branch name pattern valid"
            BRANCH_VALID=true
          else
            echo "✗ Branch name does not match pattern"
            BRANCH_VALID=false
          fi
          echo "branch_valid=$BRANCH_VALID" >> $GITHUB_OUTPUT

          QUERY='query($owner:String!, $repo:String!, $pr:Int!) {
            repository(owner:$owner, name:$repo) {
              pullRequest(number:$pr) {
                mergeStateStatus
                autoMergeRequest { enabledAt }
                reviews(last: 100) {
                  nodes {
                    state
                    author {
                      login
                    }
                  }
                }
                closingIssuesReferences {
                  totalCount
                }
              }
            }
          }'

          PR_DATA=$(gh api graphql \
            -F owner='${{ github.repository_owner }}' \
            -F repo='${{ github.event.repository.name }}' \
            -F pr='${{ github.event.pull_request.number }}' \
            -f query="$QUERY")

          ISSUE_COUNT=$(echo "$PR_DATA" | jq -r '.data.repository.pullRequest.closingIssuesReferences.totalCount')
          MERGE_STATE=$(echo "$PR_DATA" | jq -r '.data.repository.pullRequest.mergeStateStatus // "UNKNOWN"')
          AUTO_MERGE_ENABLED=$(echo "$PR_DATA" | jq -r 'if .data.repository.pullRequest.autoMergeRequest == null then "false" else "true" end')

          echo "Issue count: $ISSUE_COUNT"
          echo "Merge state: $MERGE_STATE"
          echo "Auto-merge already enabled: $AUTO_MERGE_ENABLED"

          # Check 2: PR linked to one or more issues
          if [[ "$ISSUE_COUNT" -gt 0 ]]; then
            echo "✓ PR is linked to issue"
            ISSUE_LINKED=true
          else
            echo "✗ PR is not linked to issue"
            ISSUE_LINKED=false
          fi
          echo "issue_linked=$ISSUE_LINKED" >> $GITHUB_OUTPUT

          # Check 3: For non-owner PRs, explicit owner approval is required.
          if [[ "$PR_AUTHOR" == "$REQUIRED_APPROVER" ]]; then
            echo "✓ PR authored by required approver; explicit approval not needed"
            OWNER_APPROVED=true
          else
            OWNER_APPROVED=$(echo "$PR_DATA" | jq -r --arg approver "$REQUIRED_APPROVER" '
              any(.data.repository.pullRequest.reviews.nodes[]?; .author.login == $approver and .state == "APPROVED")
            ')

            if [[ "$OWNER_APPROVED" == "true" ]]; then
              echo "✓ PR approved by required approver @$REQUIRED_APPROVER"
            else
              echo "✗ PR not yet approved by required approver @$REQUIRED_APPROVER"
            fi
          fi
          echo "owner_approved=$OWNER_APPROVED" >> $GITHUB_OUTPUT
          echo "required_approver=$REQUIRED_APPROVER" >> $GITHUB_OUTPUT

          # Check 4: PR is currently mergeable with required checks passing
          if [[ "$MERGE_STATE" == "CLEAN" ]]; then
            echo "✓ Required checks/merge requirements currently satisfied"
            CHECKS_READY=true
          else
            echo "✗ Merge requirements are not fully satisfied yet (state=$MERGE_STATE)"
            CHECKS_READY=false
          fi
          echo "checks_ready=$CHECKS_READY" >> $GITHUB_OUTPUT

          echo "auto_merge_enabled=$AUTO_MERGE_ENABLED" >> $GITHUB_OUTPUT

          # Final eligibility
          # Required checks are enforced by branch protection when auto-merge executes.
          if [[ $BRANCH_VALID == "true" && $ISSUE_LINKED == "true" && $OWNER_APPROVED == "true" ]]; then
            echo "eligible_for_auto_merge=true" >> $GITHUB_OUTPUT
            echo "✓ PR ELIGIBLE FOR AUTO MERGE"
          else
            echo "eligible_for_auto_merge=false" >> $GITHUB_OUTPUT
            echo "✗ PR REQUIRES MANUAL REVIEW"
          fi

      - name: Auto Merge if Eligible
        if: steps.eligibility.outputs.eligible_for_auto_merge == 'true' && steps.eligibility.outputs.auto_merge_enabled != 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo "$GH_REPO" \
            --auto \
            --squash \
            --delete-branch

      - name: Comment on PR - Auto Merge Ready
        if: steps.eligibility.outputs.eligible_for_auto_merge == 'true'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "$GH_REPO" \
            --edit-last \
            --create-if-none \
            --body "✅ **Auto-Merge Enabled**

          This PR is linked to an issue and follows branch naming conventions. It will auto-merge once CI checks pass."

      - name: Comment on PR - Manual Review Required
        if: steps.eligibility.outputs.eligible_for_auto_merge == 'false'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "$GH_REPO" \
            --edit-last \
            --create-if-none \
            --body "⚠️ **Manual Review Required**

          This PR requires manual review because:
          - Branch name must follow pattern: \`feature/*\`, \`bugfix/*\`, \`fix/*\`, \`docs/*\`, \`chore/*\`, \`refactor/*\`
          - PR must be linked to an issue via closing references
          - For PRs not authored by @${{ steps.eligibility.outputs.required_approver }}, approval from @${{ steps.eligibility.outputs.required_approver }} is required
          - Required checks are enforced by branch protection before merge

          Current: Branch=\`${{ github.event.pull_request.head.ref }}\`"
