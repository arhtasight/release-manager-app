# .github/workflows/pr-checks.yml
name: Branch and PR Checks

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

jobs:
  branch-gate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Decide if checks should run
        id: gate
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName === 'pull_request') {
              core.setOutput('should_run', 'true');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const { owner, repo } = context.repo;
            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 1
            });

            const hasOpenPr = prs.data.length > 0;
            core.info(`Branch ${branch} has open PR: ${hasOpenPr}`);
            core.setOutput('should_run', hasOpenPr ? 'false' : 'true');

  compile:
    needs: branch-gate
    if: needs.branch-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build

  lint:
    needs: branch-gate
    if: needs.branch-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      # Linting is temporarily disabled
      # - run: npm run lint

  test:
    needs: branch-gate
    if: needs.branch-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

  security-scan:
    needs: branch-gate
    if: needs.branch-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=moderate || true # Warn but don't fail
